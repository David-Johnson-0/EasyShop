{% extends 'easyshopapp/base.html' %}
{% block content %}
<section class="eshp-shop-header">
    <h1>Shop</h1>
    <form method="get" action="/shop/" class="eshp-shop-search">
        <input type="text" name="q" placeholder="Search...">
        <button type="submit">Search</button>
    </form>
</section>
<div class="eshp-item-list">
    {% comment %} Filler items for now; will be replaced with database items {% endcomment %}
    <div class="eshp-item">
        <img src="https://via.placeholder.com/120" alt="Item 1" class="eshp-item-img">
        <div class="eshp-item-info">
            <h3>Wireless Headphones</h3>
            <p class="eshp-item-cost">$59.99</p>
        </div>
    </div>
    <div class="eshp-item">
        <img src="https://via.placeholder.com/120" alt="Item 2" class="eshp-item-img">
        <div class="eshp-item-info">
            <h3>Smart Watch</h3>
            <p class="eshp-item-cost">$129.99</p>
        </div>
    </div>
    <div class="eshp-item">
        <img src="https://via.placeholder.com/120" alt="Item 3" class="eshp-item-img">
        <div class="eshp-item-info">
            <h3>Bluetooth Speaker</h3>
            <p class="eshp-item-cost">$39.99</p>
        </div>
    </div>
</div>
{% endblock %}
