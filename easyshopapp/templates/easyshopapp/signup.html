{% extends 'easyshopapp/base.html' %}
{% block content %}
<h1>Signup</h1>
<form method="post">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username"><br>
    <input type="password" name="password" placeholder="Password"><br>
    <button type="submit">Signup</button>
</form>
{% endblock %}
