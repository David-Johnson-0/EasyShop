{% extends 'easyshopapp/base.html' %}
{% block content %}
<section class="eshp-auth">
    <h1>Signup</h1>
    <form method="post" class="eshp-auth-form">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username">
        <input type="password" name="password" placeholder="Password">
        <button type="submit" class="eshp-btn eshp-btn-primary">Signup</button>
    </form>
</section>
{% endblock %}
